openapi: 3.0.3
info:
  title: GST Invoice & Employee Management API
  version: "1.0"
  description: |
    Laravel REST API used by the Next.js SPA. Authenticated routes expect
    `Authorization: Bearer {sanctum_token}` unless noted.
servers:
  - url: http://localhost:8000/api
paths:
  /auth/google:
    post:
      summary: Exchange Google ID token for Sanctum API token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: OK
  /contact:
    post:
      summary: Submit public contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, message]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                message: { type: string }
      responses:
        "201":
          description: Created
  /user:
    get:
      summary: Current authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
  /invoices:
    get:
      summary: Paginated invoices
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: firm_id
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer }
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: direction
          schema: { type: string, enum: [outbound, inbound] }
      responses:
        "200":
          description: Paginated collection
    post:
      summary: Create invoice
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Created
  /reports/dashboard:
    get:
      summary: Dashboard KPIs
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
